{% extends "base.html" %}
{% block content %}
<div style="min-height:calc(100vh - 200px);display:grid;place-items:center;padding:3rem var(--page-px);text-align:center">
  <div style="max-width:480px">
    <div style="font-size:4rem;color:var(--text-tertiary);margin-bottom:1.25rem"><i class="bi bi-shield-x"></i></div>
    <div style="font-size:4rem;font-weight:900;letter-spacing:-.05em;color:var(--text-primary);line-height:1;margin-bottom:.75rem">403</div>
    <h1 style="font-size:1.375rem;font-weight:800;color:var(--text-primary);margin:0 0 .625rem">Forbidden</h1>
    <p style="font-size:.9375rem;color:var(--text-secondary);margin:0 0 2rem;line-height:1.65">You don't have permission to access this resource.</p>
    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg"><i class="bi bi-house"></i> Go Home</a>
      <button onclick="history.back()" class="btn btn-secondary btn-lg"><i class="bi bi-arrow-left"></i> Go Back</button>
    </div>
  </div>
</div>
{% endblock %}

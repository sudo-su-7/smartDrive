{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width:700px">
  <h3 class="fw-bold mb-4"><i class="bi bi-bell me-2 text-primary"></i>Notifications</h3>

  {% if notifications %}
  <div class="card admin-card">
    {% for n in notifications %}
    <div class="notification-item p-3 border-bottom {% if not n.read %}unread{% endif %}">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="mb-1 {% if not n.read %}fw-semibold{% endif %}">
            <i class="bi bi-info-circle text-primary me-2"></i>{{ n.message }}
          </p>
          <small class="text-muted">{{ n.created_at.strftime('%d %b %Y, %H:%M') }}</small>
        </div>
        {% if n.link %}
        <a href="{{ n.link }}" class="btn btn-sm btn-outline-primary ms-3 flex-shrink-0">View</a>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="text-center py-5">
    <i class="bi bi-bell-slash display-1 text-muted"></i>
    <h5 class="mt-3 text-muted">No notifications yet</h5>
  </div>
  {% endif %}
</div>
{% endblock %}
